name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/server/target
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - run: cargo build
      - run: cargo test

  # Windows MSI: ICE57 must stay green (file associations ≠ Path component).
  windows-msi:
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/desktop/target
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            server
            desktop
          shared-key: windows-msi
      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked
      - name: Build MSI
        shell: pwsh
        run: .\deploy\windows\build-msi.ps1
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-editor-msi
          path: desktop/target/release/bundle/msi/*.msi
          if-no-files-found: error
      - name: Attach MSI to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $msi = Get-ChildItem desktop/target/release/bundle/msi/*.msi | Select-Object -First 1
          if (-not $msi) { throw "MSI not found" }
          # Create draft release if missing, then attach MSI.
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
          }
          gh release upload $tag $msi.FullName --clobber
